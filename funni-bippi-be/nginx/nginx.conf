events {
  worker_connections 1024;
}

http {
  upstream api_gateway {
    # ip_hash = sticky sessions: same client IP always lands on same instance.
    # Socket.IO Redis adapter (apps/api-gateway/src/redis-io.adapter.ts) makes
    # cross-instance broadcasts work even without this, but ip_hash keeps
    # reconnects cheap. Add one `server` line per running gateway instance.
    ip_hash;

    # Single-host (multiple ports on this machine):
    server localhost:3001;
    server localhost:3002;
    # server localhost:3003;

    # Multi-host (AWS EC2 etc.) — comment out the localhost lines above and
    # point at each instance's private IP/DNS instead. All instances must
    # share the same Redis (REDIS_URL) and Kafka (KAFKA_BROKERS) — see
    # .env.example and README "Horizontal Scaling".
    # server 10.0.1.10:3001;
    # server 10.0.1.11:3001;
    # server 10.0.1.12:3001;
  }

  limit_req_zone $binary_remote_addr zone=global:10m rate=30r/s;
  limit_req_zone $binary_remote_addr zone=upload:10m rate=5r/m;

  server {
    listen 80;

    location /upload {
      limit_req zone=upload burst=3 nodelay;
      client_max_body_size 5m;
      proxy_pass http://api_gateway;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
      limit_req zone=global burst=10 nodelay;
      proxy_pass http://api_gateway;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
  }
}
